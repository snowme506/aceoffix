<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的订单 - AceOffix</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .page-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin: 0 0 24px;
    }
    .page-tab {
      padding: 12px 0;
      margin-right: 24px;
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .page-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }
    .order-card {
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .order-no { font-size: var(--text-xs); color: var(--text-light); }
    .order-status {
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .order-status.pending { color: #e8650a; }
    .order-status.paid { color: #2d8a2d; }
    .order-status.cancelled { color: var(--text-light); }
    .order-row {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-sm);
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .order-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .order-total-label { font-size: var(--text-xs); color: var(--text-light); }
    .order-total-val { font-size: var(--text-base); font-weight: 700; color: var(--text); }
    .order-date { font-size: var(--text-xs); color: var(--text-light); margin-top: 8px; }
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="header-logo" style="font-size: var(--text-md)">Ace<span style="color:#e8650a">Off</span>ix</a>
    <nav class="header-nav">
      <a href="product.html" class="header-nav-link">BIKES</a>
      <a href="product.html?category_id=2" class="header-nav-link">PARTS</a>
      <a href="stores.html" class="header-nav-link">STORES</a>
    </nav>
    <div class="header-actions">
      <a href="profile.html" class="header-btn">&#x2714;</a>
    </div>
  </header>

  <div class="container" style="padding-top:16px">
    <div class="page-tabs">
      <div class="page-tab active" data-filter="all" onclick="switchTab(this)">全部</div>
      <div class="page-tab" data-filter="pending" onclick="switchTab(this)">待支付</div>
      <div class="page-tab" data-filter="paid" onclick="switchTab(this)">已完成</div>
    </div>

    <div id="orderList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script>
    (function() {
      if (!isLoggedIn()) {
        location.href = 'login.html';
        return;
      }

      var allOrders = [];
      var currentFilter = 'all';

      function getStatusText(status, paymentStatus) {
        if (status === 'PENDING' && paymentStatus === 'UNPAID') return '待支付';
        if (status === 'PAID' && paymentStatus === 'PAID') return '已完成';
        if (status === 'CANCELLED') return '已取消';
        return status;
      }

      function renderOrders(orders) {
        var list = $('#orderList');
        var filtered = orders.filter(function(o) {
          if (currentFilter === 'all') return true;
          if (currentFilter === 'pending') return o.status === 'PENDING' && o.payment_status === 'UNPAID';
          if (currentFilter === 'paid') return o.status === 'PAID' && o.payment_status === 'PAID';
          return true;
        });

        if (filtered.length === 0) {
          list.innerHTML = '<div class="empty">暂无订单</div>';
          return;
        }

        list.innerHTML = filtered.map(function(o) {
          var statusClass = 'cancelled';
          if (o.status === 'PENDING' && o.payment_status === 'UNPAID') statusClass = 'pending';
          if (o.status === 'PAID' && o.payment_status === 'PAID') statusClass = 'paid';

          return '<div class="order-card">' +
            '<div class="order-header">' +
              '<span class="order-no">' + escapeHtml(o.order_no || '') + '</span>' +
              '<span class="order-status ' + statusClass + '">' + getStatusText(o.status, o.payment_status) + '</span>' +
            '</div>' +
            '<div class="order-row"><span>商品总额</span><span>¥' + Math.round(o.total_amount/100).toLocaleString() + '</span></div>' +
            (o.discount_amount > 0 ? '<div class="order-row"><span>优惠</span><span>-¥' + Math.round(o.discount_amount/100).toLocaleString() + '</span></div>' : '') +
            '<div class="order-total-row">' +
              '<span class="order-total-label">实付</span>' +
              '<span class="order-total-val">¥' + Math.round(o.final_amount/100).toLocaleString() + '</span>' +
            '</div>' +
            '<div class="order-date">' + formatDateTime(o.created_at) + '</div>' +
          '</div>';
        }).join('');
      }

      window.switchTab = function(el) {
        document.querySelectorAll('.page-tab').forEach(function(t) { t.classList.remove('active'); });
        el.classList.add('active');
        currentFilter = el.dataset.filter;
        renderOrders(allOrders);
      };

      (async function() {
        try {
          var res = await OrderAPI.list();
          if (res.code === 200) {
            allOrders = res.data.items || [];
            renderOrders(allOrders);
          } else {
            $('#orderList').innerHTML = '<div class="empty">加载失败</div>';
          }
        } catch (e) {
          $('#orderList').innerHTML = '<div class="empty">加载失败</div>';
          if (e.message && e.message.includes('认证')) {
            localStorage.removeItem('user_token');
            localStorage.removeItem('user_info');
            location.href = 'login.html';
          }
        }
      })();
    })();
  </script>
</body>
</html>
