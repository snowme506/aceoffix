<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - AceOffix</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--bg); }
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--gap);
    }
    .login-box {
      width: 100%;
      max-width: 360px;
    }
    .login-logo {
      font-size: var(--text-xl);
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-align: center;
    }
    .login-logo span { color: #e8650a; }
    .login-title {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 20px;
    }
    .code-row { display: flex; gap: 10px; }
    .code-row .form-input { flex: 1; }
    .code-row .btn { white-space: nowrap; min-width: 100px; padding: 12px; font-size: var(--text-sm); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-btn { width: 100%; margin-top: 8px; }
    .login-tip {
      margin-top: 16px;
      font-size: var(--text-xs);
      color: var(--text-light);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">Ace<span>Off</span>ix</div>
      <div class="login-title">手机号登录</div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">手机号码</label>
          <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11" required>
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="code-row">
            <input type="text" class="form-input" id="code" placeholder="请输入验证码" maxlength="6" required>
            <button type="button" class="btn btn-outline" id="sendBtn" onclick="sendCode()">获取验证码</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">登录</button>
      </form>
      <div class="login-tip">未注册手机号将自动创建账号</div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script>
    (function() {
      if (isLoggedIn()) {
        location.href = 'profile.html';
        return;
      }

      var countdown = 0;
      var timer = null;

      window.sendCode = async function() {
        var phone = $('#phone').value.trim();
        if (!/^1[3-9]\d{9}$/.test(phone)) {
          showToast('请输入正确的手机号');
          return;
        }
        if (countdown > 0) return;

        var btn = $('#sendBtn');
        btn.disabled = true;

        try {
          var res = await AuthAPI.sendCode(phone);
          if (res.code === 200) {
            showToast('验证码已发送' + (res.data.mock_code ? '：' + res.data.mock_code : ''));
            countdown = 60;
            btn.textContent = countdown + 's';
            timer = setInterval(function() {
              countdown--;
              if (countdown <= 0) {
                clearInterval(timer);
                btn.textContent = '获取验证码';
                btn.disabled = false;
              } else {
                btn.textContent = countdown + 's';
              }
            }, 1000);
          } else {
            showToast(res.message || '发送失败');
            btn.disabled = false;
          }
        } catch (e) {
          showToast(e.message || '发送失败');
          btn.disabled = false;
        }
      };

      $('#loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var phone = $('#phone').value.trim();
        var code = $('#code').value.trim();
        if (!/^1[3-9]\d{9}$/.test(phone)) {
          showToast('请输入正确的手机号');
          return;
        }
        if (!code) {
          showToast('请输入验证码');
          return;
        }

        var btn = $('#loginBtn');
        btn.disabled = true;
        btn.textContent = '登录中...';

        try {
          var res = await AuthAPI.login(phone, code);
          if (res.code === 200) {
            localStorage.setItem('user_token', res.data.access_token);
            localStorage.setItem('user_info', JSON.stringify(res.data.user));
            showToast('登录成功');
            setTimeout(function() {
              location.href = 'profile.html';
            }, 600);
          } else {
            showToast(res.message || '登录失败');
            btn.disabled = false;
            btn.textContent = '登录';
          }
        } catch (e) {
          showToast(e.message || '登录失败');
          btn.disabled = false;
          btn.textContent = '登录';
        }
      });
    })();
  </script>
</body>
</html>
