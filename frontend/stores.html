<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>门店 - AceOffix</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .stores-layout { padding: 16px 0; }
    .store-card { border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-bottom: 12px; transition: all 0.2s; }
    .store-card:hover { border-color: var(--text-light); }
    .store-name { font-weight: 600; color: var(--text); font-size: var(--text-md); }
    .store-addr { font-size: var(--text-sm); color: var(--text-secondary); margin-top: 6px; }
    .store-hours { font-size: var(--text-sm); color: var(--text-secondary); margin-top: 4px; }
    .store-phone { font-size: var(--text-sm); color: var(--text-secondary); margin-top: 4px; }
    .store-status { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: var(--text-xs); font-weight: 600; margin-top: 8px; }
    .store-status.open { background: #f0f9f0; color: #2d8a2d; }
    .store-status.closed { background: #fef0f0; color: #c44; }
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="header-logo">Ace<span style="color:#e8650a">Off</span>ix</a>
    <nav class="header-nav">
      <a href="product.html" class="header-nav-link">BIKES</a>
      <a href="product.html?category_id=2" class="header-nav-link">PARTS</a>
      <a href="stores.html" class="header-nav-link" style="color:var(--text);border-bottom-color:var(--text);">STORES</a>
    </nav>
    <div class="header-actions">
      <a href="profile.html" class="header-btn">&#x2714;</a>
    </div>
  </header>

  <div class="container">
    <div class="page-title" style="margin:16px 0 0;font-size: var(--text-xl);font-weight:700;">门店列表</div>

    <div class="stores-layout">
      <div class="search-bar" style="margin-bottom:16px">
        <input type="text" id="cityFilter" placeholder="搜索城市，如北京、杭州" style="width:100%;max-width:320px;">
      </div>
      <div id="storesList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let storesData = [];

    async function loadStores() {
      const listEl = document.getElementById('storesList');
      listEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      const city = document.getElementById('cityFilter').value.trim();
      const params = { page: 1, page_size: 100 };
      if (city) params.city = city;
      try {
        const res = await PublicAPI.stores(params);
        if (res.code === 200) {
          storesData = res.data.items || [];
          renderStores(storesData);
        } else {
          listEl.innerHTML = '<div class="empty">加载失败</div>';
        }
      } catch (e) {
        listEl.innerHTML = '<div class="empty">加载失败，请检查网络</div>';
      }
    }

    function renderStores(list) {
      const listEl = document.getElementById('storesList');
      if (!list || !list.length) {
        listEl.innerHTML = '<div class="empty">暂无门店</div>';
        return;
      }
      listEl.innerHTML = list.map(s => `
        <div class="store-card">
          <div class="store-name">${escapeHtml(s.name)}</div>
          <div class="store-addr">${escapeHtml([s.province, s.city, s.district, s.address].filter(Boolean).join(' '))}</div>
          <div class="store-phone">${escapeHtml(s.phone || '')}</div>
          <div class="store-hours">营业时间：${escapeHtml(s.hours || '-')}</div>
          <div class="store-status ${s.status === 1 ? 'open' : 'closed'}">${s.status === 1 ? '营业中' : '休息中'}</div>
        </div>
      `).join('');
    }

    document.getElementById('cityFilter').addEventListener('input', () => loadStores());

    loadStores();
  </script>
</body>
</html>
